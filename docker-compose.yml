services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vinted
      POSTGRES_PASSWORD: vinted
      POSTGRES_DB: vinted_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinted -d vinted_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://vinted:vinted@db:5432/vinted_bot
      REDIS_URL: redis://redis:6379/0
      VINTED_SESSION_FILE: /data/vinted_session.enc
    volumes:
      - vinted_data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  redis_data:
  vinted_data:
